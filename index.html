<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>مواقيت الصلاة - ييوو</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#020814;--gold:#f0c040;--white:#f7fbff;--muted:#8ab4d0;--green:#00e676}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--white);font-family:'Tajawal',Arial,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(ellipse at 50% 0%,rgba(20,60,120,0.5) 0%,transparent 60%),linear-gradient(180deg,#020814 0%,#07152b 50%,#020814 100%)}
.header{text-align:center;padding:24px 20px 12px}
.city-name{font-size:13px;color:var(--muted);margin-bottom:6px;letter-spacing:2px}
.city-name::before{content:"📍 "}
.greg-date{font-size:15px;color:var(--white);font-weight:700;margin-bottom:4px;letter-spacing:1px}
.hijri-date{font-family:'Amiri';font-size:20px;color:var(--gold);font-weight:700;margin-bottom:8px}
.day-name{font-size:32px;font-weight:900;margin-bottom:2px}
.day-name-en{font-size:14px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.clock-section{text-align:center;padding:8px 20px 24px}
.clock-time{font-size:80px;font-weight:900;line-height:1;letter-spacing:-3px;text-shadow:0 0 30px rgba(240,192,64,0.3);font-variant-numeric:tabular-nums}
.clock-ampm{font-size:22px;color:var(--gold);font-weight:900;vertical-align:super;margin-right:6px}
.next-prayer-card{background:linear-gradient(135deg,rgba(0,100,50,0.3),rgba(0,60,30,0.4));border:1px solid rgba(0,230,118,0.3);border-radius:24px;margin:0 20px 20px;padding:20px;position:relative;overflow:hidden;box-shadow:0 0 25px rgba(0,230,118,0.1)}
.next-prayer-card::before{content:"";position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(0,230,118,0.08) 0%,transparent 60%);animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}
.next-label{font-size:13px;color:var(--green);font-weight:900;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.next-label::before{content:"🔔 "}
.next-name{font-family:'Amiri';font-size:40px;font-weight:700;margin-bottom:6px;position:relative;z-index:1}
.next-time{font-size:16px;color:var(--gold);font-weight:900;margin-bottom:16px;position:relative;z-index:1;letter-spacing:1px}
.countdown{font-size:42px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;position:relative;z-index:1;text-shadow:0 0 15px rgba(0,230,118,0.3);letter-spacing:2px}
.countdown-labels{display:flex;justify-content:center;gap:28px;font-size:11px;color:rgba(200,255,220,0.6);margin-top:6px;position:relative;z-index:1;font-weight:700}
.progress-bar{height:5px;background:rgba(0,0,0,0.3);border-radius:10px;margin-top:14px;overflow:hidden;position:relative;z-index:1}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#76ff03);border-radius:10px;transition:width 1s ease;box-shadow:0 0 8px rgba(0,230,118,0.4)}
.prayer-list{padding:0 20px}
.section-title{font-size:13px;color:var(--gold);font-weight:900;margin-bottom:12px;letter-spacing:2px;padding:0 4px}
.prayer-item{display:grid;grid-template-columns:48px 1fr 90px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);position:relative}
.prayer-item:last-child{border-bottom:none}
.prayer-item.active{background:linear-gradient(90deg,transparent,rgba(0,230,118,0.06),transparent);margin:0 -20px;padding:14px 20px;border-radius:16px;border-bottom:none;margin-bottom:4px}
.prayer-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:radial-gradient(circle,rgba(20,60,120,0.5),rgba(5,20,45,0.6));border:1px solid rgba(255,255,255,0.08)}
.prayer-item.active .prayer-icon{background:radial-gradient(circle,rgba(0,100,50,0.5),rgba(0,60,30,0.6));border-color:rgba(0,230,118,0.3);box-shadow:0 0 12px rgba(0,230,118,0.2)}
.prayer-info{text-align:right}
.prayer-name-ar{font-family:'Amiri';font-size:26px;font-weight:700;line-height:1.2}
.prayer-name-en{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.prayer-time{direction:ltr;text-align:left;font-size:26px;font-weight:900;font-variant-numeric:tabular-nums}
.prayer-time small{font-size:13px;color:var(--gold);margin-left:4px;font-weight:700}
.active-badge{position:absolute;left:0;top:50%;transform:translateY(-50%);background:linear-gradient(90deg,var(--green),#76ff03);color:#000;font-size:9px;font-weight:900;padding:3px 10px;border-radius:0 10px 10px 0;letter-spacing:1px}
.sun-section{padding:16px 20px 8px}
.sun-times{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sun-box{background:rgba(6,28,58,0.4);border:1px solid rgba(240,192,64,0.15);border-radius:16px;padding:14px;text-align:center}
.sun-icon{font-size:28px;margin-bottom:4px;display:block}
.sun-label{font-size:11px;color:var(--gold);font-weight:900;letter-spacing:1px;margin-bottom:4px}
.sun-time{font-size:20px;font-weight:900;direction:ltr}
.azkar-section{margin:20px;padding:24px 20px;background:linear-gradient(135deg,rgba(15,40,80,0.3),rgba(5,20,45,0.4));border:1px solid rgba(240,192,64,0.15);border-radius:20px;text-align:center;position:relative;overflow:hidden}
.azkar-icon{font-size:36px;margin-bottom:12px;display:block;opacity:0.9}
.azkar-text{font-family:'Amiri';font-size:22px;font-weight:700;line-height:1.7;margin-bottom:10px;position:relative;z-index:1}
.azkar-translation{font-size:13px;color:var(--gold);line-height:1.6;position:relative;z-index:1;opacity:0.9}
.azkar-label{font-size:11px;color:var(--muted);margin-top:14px;letter-spacing:3px;text-transform:uppercase;position:relative;z-index:1}
.footer{text-align:center;padding:20px 16px 30px;font-size:12px;color:var(--muted);border-top:1px solid rgba(255,255,255,0.06)}
.qibla{font-size:15px;font-weight:900;color:var(--white);margin-bottom:6px;letter-spacing:1px}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn 0.5s ease forwards;opacity:0}
.delay-1{animation-delay:0.1s}
.delay-2{animation-delay:0.2s}
.delay-3{animation-delay:0.3s}
.delay-4{animation-delay:0.4s}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(240,192,64,0.2);border-radius:4px}
.prayer-item.past{opacity:0.4}
.prayer-item.past .prayer-name-ar{color:var(--muted)}
</style>
</head>
<body>

<div class="header animate-in">
  <div class="city-name">Yiwu, China</div>
  <div class="greg-date" id="GREG">—</div>
  <div class="hijri-date" id="HIJRI">—</div>
  <div class="day-name" id="DAYNAME">—</div>
  <div class="day-name-en" id="DAYNAMEEN">—</div>
</div>

<div class="clock-section animate-in delay-1">
  <span class="clock-time" id="CLOCK">00:00</span>
  <span class="clock-ampm" id="AMPM">م</span>
</div>

<div class="next-prayer-card animate-in delay-2">
  <div class="next-label">الصلاة القادمة</div>
  <div class="next-name" id="NEXTNAME">—</div>
  <div class="next-time" id="NEXTTIME">—</div>
  <div class="countdown" id="COUNTDOWN">00:00:00</div>
  <div class="countdown-labels"><span>ساعة</span><span>دقيقة</span><span>ثانية</span></div>
  <div class="progress-bar"><div class="progress-fill" id="PROGRESS" style="width:0%"></div></div>
</div>

<div class="sun-section animate-in delay-3">
  <div class="sun-times">
    <div class="sun-box">
      <span class="sun-icon">🌅</span>
      <div class="sun-label">الشروق</div>
      <div class="sun-time" id="SUNRISE">--:--</div>
    </div>
    <div class="sun-box">
      <span class="sun-icon">🌇</span>
      <div class="sun-label">الغروب</div>
      <div class="sun-time" id="SUNSET">--:--</div>
    </div>
  </div>
</div>

<div class="prayer-list animate-in delay-3">
  <div class="section-title">الصلوات الخمس</div>
  <div id="PRAYERLIST"></div>
</div>

<div class="azkar-section animate-in delay-4">
  <span class="azkar-icon">📖</span>
  <div class="azkar-text" id="AZKAR">اللهم أعنا على ذكرك وشكرك وحسن عبادتك</div>
  <div class="azkar-translation" id="AZKARTRANS">O Allah, help us to remember You, thank You, and worship You in the best way</div>
  <div class="azkar-label">أذكار اليوم</div>
</div>

<div class="footer">
  <div class="qibla">🕋 اتجاه القبلة: 249°</div>
  <div>تم التحديث: <span id="UPDATED">--:--</span></div>
</div>

<script>
var D={1:[["06:05","06:54","13:00","15:35","17:18","18:40"],["06:05","06:54","13:00","15:35","17:18","18:40"],["06:05","06:54","13:00","15:35","17:19","18:40"],["06:10","06:55","13:00","15:35","17:20","18:40"],["06:10","06:55","13:00","15:35","17:20","18:40"],["06:10","06:55","13:00","15:35","17:21","18:45"],["06:10","06:55","13:00","15:35","17:22","18:45"],["06:10","06:55","13:00","15:35","17:23","18:45"],["06:10","06:55","13:00","15:35","17:24","18:45"],["06:10","06:55","13:00","15:35","17:24","18:45"],["06:10","06:55","13:00","15:35","17:25","18:45"],["06:10","06:55","13:00","15:40","17:26","18:50"],["06:10","06:55","13:00","15:40","17:27","18:50"],["06:10","06:55","13:00","15:40","17:28","18:50"],["06:10","06:55","13:00","15:40","17:29","18:50"],["06:10","06:55","13:00","15:40","17:29","18:50"],["06:10","06:55","13:00","15:40","17:30","18:50"],["06:10","06:55","13:00","15:40","17:31","18:55"],["06:05","06:54","13:00","15:40","17:32","18:55"],["06:05","06:54","13:00","15:40","17:33","18:55"],["06:05","06:54","13:00","15:40","17:34","18:55"],["06:05","06:53","13:00","15:40","17:34","18:55"],["06:05","06:53","13:00","15:40","17:35","18:55"],["06:05","06:53","13:00","15:45","17:36","19:00"],["06:05","06:52","13:00","15:45","17:37","19:00"],["06:05","06:52","13:00","15:45","17:38","19:00"],["06:05","06:52","13:00","15:45","17:39","19:00"],["06:05","06:51","13:00","15:45","17:40","19:00"],["06:05","06:51","13:00","15:45","17:40","19:00"],["06:05","06:50","13:00","15:45","17:41","19:05"],["06:05","06:50","13:00","15:45","17:42","19:05"]],6:[["04:15","05:01","13:00","16:55","18:59","20:20"],["04:15","05:01","13:00","16:55","19:00","20:20"],["04:15","05:00","13:00","16:55","19:00","20:20"],["04:15","05:00","13:00","16:55","19:01","20:20"],["04:15","05:00","13:00","16:55","19:01","20:20"],["04:15","05:00","13:00","16:55","19:02","20:20"],["04:15","05:00","13:00","16:55","19:02","20:20"],["04:15","05:00","13:00","16:55","19:03","20:25"],["04:15","05:00","13:00","16:55","19:03","20:25"],["04:15","05:00","13:00","16:55","19:04","20:25"],["04:15","05:00","13:00","16:55","19:04","20:25"],["04:15","05:00","13:00","16:55","19:04","20:25"],["04:15","05:00","13:00","17:00","19:05","20:25"],["04:15","05:00","13:00","17:00","19:05","20:25"],["04:15","05:00","13:00","17:00","19:06","20:25"],["04:15","05:00","13:00","17:00","19:06","20:25"],["04:15","05:00","13:00","17:00","19:06","20:25"],["04:15","05:00","13:00","17:00","19:06","20:25"],["04:15","05:00","13:00","17:00","19:07","20:30"],["04:15","05:01","13:00","17:00","19:07","20:30"],["04:15","05:01","13:00","17:00","19:07","20:30"],["04:15","05:01","13:00","17:00","19:07","20:30"],["04:15","05:01","13:00","17:00","19:07","20:30"],["04:15","05:01","13:00","17:00","19:08","20:30"],["04:15","05:02","13:00","17:00","19:08","20:30"],["04:15","05:02","13:00","17:00","19:08","20:30"],["04:15","05:02","13:00","17:00","19:08","20:30"],["04:15","05:03","13:00","17:00","19:08","20:30"],["04:15","05:03","13:00","17:00","19:08","20:30"],["04:15","05:03","13:00","17:00","19:08","20:30"]]};
for(let m=2;m<=5;m++){D[m]=D[1].map((day,i)=>day.map((t,j)=>{let h=parseInt(t.split(':')[0]),mn=parseInt(t.split(':')[1]);let adj=(m-1)*0.3;if(j===0)h=Math.max(4,h-Math.floor(adj*2));if(j===1)h=Math.max(5,h-Math.floor(adj*1.5));if(j===3)h=Math.min(17,h+Math.floor(adj));if(j===4)h=Math.min(20,h+Math.floor(adj*1.5));if(j===5)h=Math.min(21,h+Math.floor(adj*2));return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0')}))}
for(let m=7;m<=12;m++){D[m]=D[6].map((day,i)=>day.map((t,j)=>{let h=parseInt(t.split(':')[0]),mn=parseInt(t.split(':')[1]);let adj=(m-6)*0.4;if(j===0)h=Math.min(6,h+Math.floor(adj));if(j===1)h=Math.min(7,h+Math.floor(adj*0.8));if(j===3)h=Math.max(15,h-Math.floor(adj*0.5));if(j===4)h=Math.max(17,h-Math.floor(adj));if(j===5)h=Math.max(18,h-Math.floor(adj*1.2));return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0')}))}

var PR=[{ar:'الفجر',en:'FAJR',ic:'🌙',idx:0},{ar:'الشروق',en:'SUNRISE',ic:'🌅',idx:1},{ar:'الظهر',en:'DHUHR',ic:'☀️',idx:2},{ar:'العصر',en:'ASR',ic:'🌤️',idx:3},{ar:'المغرب',en:'MAGHRIB',ic:'🌆',idx:4},{ar:'العشاء',en:'ISHA',ic:'🌃',idx:5}];
var DAYS=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
var EN_DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var AR_MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
var AD=[['اللهم أعنا على ذكرك وشكرك وحسن عبادتك','O Allah, help us to remember You, thank You, and worship You in the best way'],['سبحان الله وبحمده، سبحان الله العظيم','Glory be to Allah and praise be to Him'],['ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار','Our Lord, give us good in this world and the Hereafter'],['اللهم اجعل هذا اليوم خيرًا وبركة','O Allah, make this day full of goodness and blessings']];
var az=0;

function pad(n){return String(n).padStart(2,'0')}
function toMin(t){var p=t.split(':');return +p[0]*60 + +p[1]}
function fmt(t){var p=t.split(':'),h=parseInt(p[0],10),m=p[1],ap=h>=12?'م':'ص';h=h%12;if(h===0)h=12;return pad(h)+':'+m+' '+ap}
function todayTimes(){var n=new Date();return D[n.getMonth()+1][n.getDate()-1]}
function nextPrayer(ts){var now=new Date(),cur=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();for(var i=0;i<PR.length;i++){var p=PR[i],tm=toMin(ts[p.idx])*60;if(tm>cur)return {p:p,remain:tm-cur,target:tm/60};}var f=PR[0],t=toMin(ts[f.idx])*60;return {p:f,remain:24*3600-cur+t,target:toMin(ts[f.idx])+1440}}
function hijri(){return new Intl.DateTimeFormat('ar-SA-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(new Date())}

function getArabicDate(){
  var n=new Date();
  var day=n.getDate();
  var month=AR_MONTHS[n.getMonth()];
  var year=n.getFullYear();
  return day+' '+month+' '+year;
}

function render(){
  var n=new Date(),h=n.getHours(),mn=n.getMinutes(),sec=n.getSeconds(),h12=h%12||12;
  document.getElementById('CLOCK').textContent=pad(h12)+':'+pad(mn);
  document.getElementById('AMPM').textContent=h>=12?'م':'ص';
  document.getElementById('DAYNAME').textContent=DAYS[n.getDay()];
  document.getElementById('DAYNAMEEN').textContent=EN_DAYS[n.getDay()];
  document.getElementById('GREG').textContent=getArabicDate();
  document.getElementById('HIJRI').textContent=hijri();
  document.getElementById('UPDATED').textContent=pad(h)+':'+pad(mn);
  
  var ts=todayTimes(),nx=nextPrayer(ts);
  document.getElementById('NEXTNAME').textContent=nx.p.ar;
  document.getElementById('NEXTTIME').textContent='حتى '+fmt(ts[nx.p.idx]);
  document.getElementById('COUNTDOWN').textContent=pad(Math.floor(nx.remain/3600))+':'+pad(Math.floor(nx.remain%3600/60))+':'+pad(nx.remain%60);
  
  var all=PR.map(x=>toMin(ts[x.idx]));
  var nowMin=h*60+mn+sec/60;
  var nextM=nx.target;
  var prevM=all[all.length-1]-1440;
  for(var i=0;i<all.length;i++){if(all[i]<nextM&&all[i]<=nowMin)prevM=all[i]}
  var total=(nextM-prevM)*60,since=(nowMin-prevM)*60;
  document.getElementById('PROGRESS').style.width=Math.max(0,Math.min(100,(since/total)*100))+'%';
  
  var html='';
  PR.forEach(function(p){
    if(p.idx===1)return;
    var tm=toMin(ts[p.idx]);
    var isActive=p.idx===nx.p.idx;
    var isPast=tm<h*60+mn;
    var cls=isActive?' active':(isPast?' past':'');
    html+='<div class="prayer-item'+cls+'">'+(isActive?'<div class="active-badge">القادمة</div>':'')+'<div class="prayer-icon">'+p.ic+'</div><div class="prayer-info"><div class="prayer-name-ar">'+p.ar+'</div><div class="prayer-name-en">'+p.en+'</div></div><div class="prayer-time">'+fmt(ts[p.idx])+'</div></div>';
  });
  document.getElementById('PRAYERLIST').innerHTML=html;
  document.getElementById('SUNRISE').textContent=fmt(ts[1]);
  document.getElementById('SUNSET').textContent=fmt(ts[4]);
}

function updateAzkar(){
  var a=AD[az%AD.length];
  document.getElementById('AZKAR').textContent=a[0];
  document.getElementById('AZKARTRANS').textContent=a[1];
  az++;
}

render();
updateAzkar();
setInterval(render,1000);
setInterval(updateAzkar,15000);

document.addEventListener('dblclick',function(e){e.preventDefault()},false);
</script>
</body>
</html>
